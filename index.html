<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Life Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#6c63ff,#4b3fdb);
    color:#222;
    min-height:100vh;
    padding:20px;
    transition:0.3s;
}

.container{
    max-width:1100px;
    margin:auto;
}

.header{
    background:white;
    padding:25px;
    border-radius:15px;
    text-align:center;
    margin-bottom:20px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

#clock{
    font-size:40px;
    font-weight:bold;
    margin:10px 0;
}

#date{
    margin-bottom:10px;
}

.dashboard-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.card h3{
    margin-bottom:15px;
}

#timer{
    font-size:50px;
    text-align:center;
    margin:20px 0;
    color:#4b3fdb;
}

.button-group{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#4b3fdb;
    color:white;
    transition:0.3s;
}

button:hover{
    opacity:0.85;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-bottom:10px;
}

.task-item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#f3f3f3;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
}

.task-item.completed span{
    text-decoration:line-through;
    color:gray;
}

.task-buttons{
    display:flex;
    gap:5px;
}

.quick-link{
    display:inline-block;
    margin:5px;
    padding:10px;
    background:#4b3fdb;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.dark-mode{
    background:#1e1e1e;
    color:white;
}

.dark-mode .card,
.dark-mode .header{
    background:#2b2b2b;
    color:white;
}

.dark-mode input{
    background:#444;
    color:white;
    border:1px solid #666;
}

@media(max-width:768px){

    #clock{
        font-size:30px;
    }

    #timer{
        font-size:40px;
    }
}

</style>
</head>

<body>

<div class="container">

    <header class="header">

        <h1>Life Dashboard</h1>

        <div id="clock"></div>

        <div id="date"></div>

        <h2 id="greeting"></h2>

        <div class="user-setting">

            <input type="text" id="username" placeholder="Masukkan nama">

            <button id="saveName">Simpan Nama</button>

        </div>

        <button id="toggleTheme">🌙 Dark Mode</button>

    </header>

    <div class="dashboard-grid">

        <!-- TIMER -->
        <section class="card">

            <h3>Focus Timer</h3>

            <div class="timer-setting">

                <input type="number" id="timerInput" min="1" value="25">

                <button id="setTimer">Set Menit</button>

            </div>

            <div id="timer">25:00</div>

            <div class="button-group">

                <button id="startBtn">Start</button>

                <button id="stopBtn">Stop</button>

                <button id="resetBtn">Reset</button>

            </div>

        </section>

        <!-- TODO LIST -->
        <section class="card">

            <h3>To-Do List</h3>

            <div class="task-input">

                <input type="text" id="taskInput" placeholder="Tambah tugas...">

                <button id="addTaskBtn">Tambah</button>

            </div>

            <div class="button-group">

                <button id="sortTaskBtn">Sort A-Z</button>

                <button id="clearTaskBtn">Hapus Semua</button>

            </div>

            <ul id="taskList"></ul>

        </section>

        <!-- QUICK LINKS -->
        <section class="card">

            <h3>Quick Links</h3>

            <div class="link-input">

                <input type="text" id="linkName" placeholder="Nama link">

                <input type="url" id="linkUrl" placeholder="https://example.com">

                <button id="addLinkBtn">Tambah Link</button>

            </div>

            <div id="quickLinks"></div>

        </section>

    </div>
</div>

<script>

const clock = document.getElementById("clock");
const dateEl = document.getElementById("date");
const greeting = document.getElementById("greeting");

function updateClock(){

    const now = new Date();

    clock.textContent = now.toLocaleTimeString("id-ID");

    dateEl.textContent = now.toLocaleDateString("id-ID",{
        weekday:"long",
        year:"numeric",
        month:"long",
        day:"numeric"
    });

    let hour = now.getHours();

    let greet = "Selamat Malam";

    if(hour >= 5 && hour < 12){

        greet = "Selamat Pagi";

    }else if(hour >= 12 && hour < 15){

        greet = "Selamat Siang";

    }else if(hour >= 15 && hour < 18){

        greet = "Selamat Sore";
    }

    const savedName = localStorage.getItem("username") || "";

    greeting.textContent = savedName
        ? `${greet}, ${savedName}`
        : greet;
}

setInterval(updateClock,1000);

updateClock();

document.getElementById("saveName").addEventListener("click",()=>{

    const username = document.getElementById("username").value.trim();

    if(username){

        localStorage.setItem("username",username);

        updateClock();

        alert("Nama berhasil disimpan!");
    }
});

let timerMinutes = localStorage.getItem("timerMinutes") || 25;

let time = timerMinutes * 60;

let timerInterval;

function updateTimerDisplay(){

    let minutes = Math.floor(time / 60);

    let seconds = time % 60;

    document.getElementById("timer").textContent =
    `${String(minutes).padStart(2,"0")}:${String(seconds).padStart(2,"0")}`;
}

document.getElementById("setTimer").addEventListener("click",()=>{

    const newMinutes = parseInt(document.getElementById("timerInput").value);

    if(newMinutes > 0){

        timerMinutes = newMinutes;

        localStorage.setItem("timerMinutes",timerMinutes);

        time = timerMinutes * 60;

        updateTimerDisplay();
    }
});

document.getElementById("startBtn").addEventListener("click",()=>{

    clearInterval(timerInterval);

    timerInterval = setInterval(()=>{

        if(time > 0){

            time--;

            updateTimerDisplay();

        }else{

            clearInterval(timerInterval);

            alert("Waktu fokus selesai!");
        }

    },1000);
});

document.getElementById("stopBtn").addEventListener("click",()=>{

    clearInterval(timerInterval);
});

document.getElementById("resetBtn").addEventListener("click",()=>{

    clearInterval(timerInterval);

    time = timerMinutes * 60;

    updateTimerDisplay();
});

updateTimerDisplay();

const taskInput = document.getElementById("taskInput");
const taskList = document.getElementById("taskList");

let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks(){

    localStorage.setItem("tasks",JSON.stringify(tasks));
}

function renderTasks(){

    taskList.innerHTML = "";

    tasks.forEach((task,index)=>{

        const li = document.createElement("li");

        li.className = task.completed
            ? "task-item completed"
            : "task-item";

        li.innerHTML = `
            <span>${task.text}</span>

            <div class="task-buttons">
                <button onclick="toggleTask(${index})">✔</button>
                <button onclick="editTask(${index})">✏</button>
                <button onclick="deleteTask(${index})">🗑</button>
            </div>
        `;

        taskList.appendChild(li);
    });
}

document.getElementById("addTaskBtn").addEventListener("click",()=>{

    const taskText = taskInput.value.trim();

    if(!taskText){

        alert("Tugas tidak boleh kosong!");

        return;
    }

    const duplicate = tasks.some(task =>
        task.text.toLowerCase() === taskText.toLowerCase()
    );

    if(duplicate){

        alert("Tugas sudah ada!");

        return;
    }

    tasks.push({
        text:taskText,
        completed:false
    });

    saveTasks();

    renderTasks();

    taskInput.value = "";
});

function toggleTask(index){

    tasks[index].completed = !tasks[index].completed;

    saveTasks();

    renderTasks();
}

function deleteTask(index){

    tasks.splice(index,1);

    saveTasks();

    renderTasks();
}

function editTask(index){

    const newTask = prompt("Edit tugas:",tasks[index].text);

    if(newTask){

        tasks[index].text = newTask;

        saveTasks();

        renderTasks();
    }
}

document.getElementById("sortTaskBtn").addEventListener("click",()=>{

    tasks.sort((a,b)=>
        a.text.localeCompare(b.text)
    );

    saveTasks();

    renderTasks();
});

document.getElementById("clearTaskBtn").addEventListener("click",()=>{

    if(confirm("Hapus semua tugas?")){

        tasks = [];

        saveTasks();

        renderTasks();
    }
});

renderTasks();

const linkName = document.getElementById("linkName");
const linkUrl = document.getElementById("linkUrl");
const quickLinks = document.getElementById("quickLinks");

let links = JSON.parse(localStorage.getItem("quickLinks")) || [];

function saveLinks(){

    localStorage.setItem("quickLinks",JSON.stringify(links));
}

function renderLinks(){

    quickLinks.innerHTML = "";

    links.forEach((link)=>{

        const a = document.createElement("a");

        a.href = link.url;

        a.target = "_blank";

        a.className = "quick-link";

        a.textContent = link.name;

        quickLinks.appendChild(a);
    });
}

document.getElementById("addLinkBtn").addEventListener("click",()=>{

    const name = linkName.value.trim();

    const url = linkUrl.value.trim();

    if(!name || !url){

        alert("Nama dan URL harus diisi!");

        return;
    }

    links.push({name,url});

    saveLinks();

    renderLinks();

    linkName.value = "";

    linkUrl.value = "";
});

renderLinks();

const toggleThemeBtn = document.getElementById("toggleTheme");

if(localStorage.getItem("theme") === "dark"){

    document.body.classList.add("dark-mode");
}

toggleThemeBtn.addEventListener("click",()=>{

    document.body.classList.toggle("dark-mode");

    if(document.body.classList.contains("dark-mode")){

        localStorage.setItem("theme","dark");

    }else{

        localStorage.setItem("theme","light");
    }
});

</script>

</body>
</html>
